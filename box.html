<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏盒子</title>
    <link rel="icon" type="image/png" href="https://github.com">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text-main); padding: 40px 20px; }
        header { text-align: center; margin-bottom: 45px; }
        header h1 { font-size: 2.6rem; margin-bottom: 12px; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 1px; }
        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 25px; max-width: 1200px; margin: 0 auto; }
        .game-card { background: var(--card-bg); border-radius: 16px; overflow: hidden; border: 1px solid #334155; display: flex; flex-direction: column; transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s; }
        .game-card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.3); }
        .game-cover { height: 120px; display: flex; align-items: center; justify-content: center; font-size: 3.5rem; background: linear-gradient(135deg, #1e1b4b, #311042); user-select: none; }
        .game-info { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }
        .game-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 15px; color: #fff; text-align: center; }
        .play-btn { display: block; text-align: center; background: var(--primary); color: white; padding: 12px; border-radius: 10px; text-decoration: none; font-weight: 600; border: none; cursor: pointer; transition: background 0.2s; width: 100%; font-size: 0.95rem; margin-top: auto; }
        .play-btn:hover { background: var(--primary-hover); }
    </style>
</head>
<body>

    <header>
        <h1>游戏中心</h1>
    </header>

    <div class="game-grid">
        <!-- 游戏 1 -->
        <div class="game-card">
            <div class="game-cover">⛏️</div>
            <div class="game-info">
                <div class="game-title">new tuff client</div>
                <button class="play-btn" onclick="playGame('https://github.io', 'new tuff client')">立即开玩</button>
            </div>
        </div>
        <!-- 游戏 2 -->
        <div class="game-card">
            <div class="game-cover">⛏️</div>
            <div class="game-info">
                <div class="game-title">modern client</div>
                <button class="play-btn" onclick="playGame('https://github.io', 'modern client')">立即开玩</button>
            </div>
        </div>
        <!-- 游戏 3 -->
        <div class="game-card">
            <div class="game-cover">⛏️</div>
            <div class="game-info">
                <div class="game-title">tuff client old</div>
                <button class="play-btn" onclick="playGame('https://github.io', 'tuff client old')">立即开玩</button>
            </div>
        </div>
        <!-- 游戏 4 -->
        <div class="game-card">
            <div class="game-cover">⛏️</div>
            <div class="game-info">
                <div class="game-title">Eaglercraft</div>
                <button class="play-btn" onclick="playGame('https://github.io', 'Eaglercraft')">立即开玩</button>
            </div>
        </div>
        <!-- 游戏 5 -->
        <div class="game-card">
            <div class="game-cover">🌐</div>
            <div class="game-info">
                <div class="game-title">Browser</div>
                <button class="play-btn" onclick="playGame('https://github.io', 'Browser')">立即开玩</button>
            </div>
        </div>
        <!-- 游戏 6 -->
        <div class="game-card">
            <div class="game-cover">🥕</div>
            <div class="game-info">
                <div class="game-title">dadish</div>
                <button class="play-btn" onclick="playGame('https://github.io', 'dadish')">立即开玩</button>
            </div>
        </div>
        <!-- 游戏 7 -->
        <div class="game-card">
            <div class="game-cover">🎮</div>
            <div class="game-info">
                <div class="game-title">game</div>
                <button class="play-btn" onclick="playGame('https://github.io', 'game')">立即开玩</button>
            </div>
        </div>
        <!-- 游戏 8 -->
        <div class="game-card">
            <div class="game-cover">⚔️</div>
            <div class="game-info">
                <div class="game-title">fight</div>
                <button class="play-btn" onclick="playGame('https://github.io', 'fight')">立即开玩</button>
            </div>
        </div>
    </div>

    <script>
        function playGame(url, title) {
            // 核心变动：因为当前页面已经是 iframe 里的 box.html，我们需要直接改变父级（即 about:blank 页面）的 iframe 地址
            window.location.href = url;
            
            // 同步修改顶部的网页标题
            if(window.parent) {
                window.parent.document.title = title;
            }
        }
    </script>
</body>
</html>
